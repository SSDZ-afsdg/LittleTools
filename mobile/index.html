<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>智能记账</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <style>
        /* 额外样式：语音按钮状态 */
        .voice-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .voice-row {
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: center;
        }
        .voice-btn {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #4CAF50, #388E3C);
            color: white;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            box-shadow: 0 4px 20px rgba(76, 175, 80, 0.4);
            transition: all 0.3s;
            user-select: none;
            -webkit-user-select: none;
        }
        .voice-btn.recording {
            background: linear-gradient(135deg, #f44336, #c62828);
            box-shadow: 0 4px 20px rgba(244, 67, 54, 0.4);
            animation: pulse 1.2s infinite;
        }
        .voice-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.06); }
        }
        .voice-btn .voice-icon {
            font-size: 32px;
            line-height: 1;
        }
        .voice-btn .voice-text {
            font-size: 12px;
            opacity: 0.9;
        }
        .stop-voice-btn {
            padding: 8px 20px;
            border: none;
            border-radius: 20px;
            background: #f44336;
            color: white;
            font-size: 14px;
            cursor: pointer;
            display: none;
        }
        .stop-voice-btn.show {
            display: inline-block;
        }
        .voice-status {
            font-size: 13px;
            color: #888;
            min-height: 20px;
            text-align: center;
        }
        .voice-status.active {
            color: #f44336;
        }
        .voice-status.success {
            color: #4CAF50;
        }
        .voice-wave {
            display: flex;
            gap: 4px;
            align-items: center;
            height: 30px;
        }
        .voice-wave span {
            display: inline-block;
            width: 4px;
            background: #4CAF50;
            border-radius: 2px;
            animation: wave 1.2s ease-in-out infinite;
        }
        .voice-wave.recording span {
            background: #f44336;
        }
        .voice-wave span:nth-child(1) { animation-delay: 0.0s; height: 20px; }
        .voice-wave span:nth-child(2) { animation-delay: 0.1s; height: 12px; }
        .voice-wave span:nth-child(3) { animation-delay: 0.2s; height: 26px; }
        .voice-wave span:nth-child(4) { animation-delay: 0.3s; height: 10px; }
        .voice-wave span:nth-child(5) { animation-delay: 0.4s; height: 28px; }
        .voice-wave span:nth-child(6) { animation-delay: 0.5s; height: 14px; }
        @keyframes wave {
            0%, 100% { transform: scaleY(0.6); }
            50% { transform: scaleY(1.2); }
        }
    </style>
</head>
<body>

    <!-- ===== 顶部标题栏 ===== -->
    <header class="app-header">
        <h1>🧾 智能记账</h1>
        <span class="sync-status" id="syncStatus">⏳ 待同步: 0</span>
    </header>

    <!-- ===== Tab 内容区域 ===== -->
    <main class="tab-content">
        <!-- Tab 1: 记账 -->
        <section id="tab-record" class="tab-panel active">
            <div class="record-container">
                <!-- 语音录入 -->
                <div class="voice-container">
                    <div class="voice-row">
                        <button class="voice-btn" id="voiceBtn">
                            <span class="voice-icon">🎙️</span>
                            <span class="voice-text">点击说话</span>
                        </button>
                        <button class="stop-voice-btn" id="stopVoiceBtn">⏹️ 停止</button>
                    </div>
                    <div class="voice-wave" id="voiceWave" style="display:none;">
                        <span></span><span></span><span></span>
                        <span></span><span></span><span></span>
                    </div>
                    <div class="voice-status" id="voiceStatus">点击按钮开始语音记账</div>
                </div>

                <!-- 文字录入 -->
                <div class="text-input-container">
                    <input type="text" id="textInput" placeholder="输入消费，如：吃火锅186">
                    <button id="textSubmitBtn">✓</button>
                </div>

                <!-- 今日汇总 -->
                <div class="today-summary" id="todaySummary">
                    <span>📅 今日：¥0.00</span>
                    <span>📝 0 笔</span>
                </div>

                <!-- 待同步提示 -->
                <div class="pending-banner" id="pendingBanner" style="display:none;">
                    ⏳ 有 <span id="pendingCount">0</span> 条待同步
                </div>
            </div>
        </section>

        <!-- Tab 2: 流水 -->
        <section id="tab-list" class="tab-panel">
            <div class="list-container">
                <div class="list-filters">
                    <button class="filter-btn active" data-filter="all">全部</button>
                    <button class="filter-btn" data-filter="pending">待同步</button>
                    <button class="filter-btn" data-filter="synced">已同步</button>
                </div>
                <ul class="expense-list" id="expenseList">
                    <li class="empty-tip">暂无记录，去记一笔吧 📝</li>
                </ul>
            </div>
        </section>

        <!-- Tab 3: 分析 -->
        <section id="tab-analytics" class="tab-panel">
            <div class="analytics-container">
                <div class="analytics-placeholder" id="analyticsPlaceholder">
                    <div class="empty-icon">📊</div>
                    <p>暂无分析数据</p>
                    <p class="hint">同步后即可查看月度报告</p>
                </div>
                <div id="analyticsContent" style="display:none;">
                    <div class="summary-cards" id="summaryCards"></div>
                    <div class="chart-container">
                        <canvas id="categoryChart"></canvas>
                    </div>
                    <div class="ai-summary" id="aiSummary"></div>
                </div>
            </div>
        </section>

        <!-- Tab 4: 设置 -->
        <section id="tab-settings" class="tab-panel">
            <div class="settings-container">
                <div class="setting-group">
                    <h3>🌐 同步设置</h3>
                    <div class="setting-item">
                        <label>电脑 IP</label>
                        <input type="text" id="serverIP" value="10.43.217.124">
                    </div>
                    <div class="setting-item">
                        <label>端口</label>
                        <input type="text" id="serverPort" value="8000">
                    </div>
                    <button class="sync-btn" id="syncBtn">🔄 立即同步</button>
                    <div class="sync-result" id="syncResult"></div>
                </div>

                <div class="setting-group">
                    <h3>📦 数据管理</h3>
                    <button class="danger-btn" id="clearPendingBtn">🗑️ 清空待同步</button>
                    <button class="danger-btn" id="clearAllBtn">⚠️ 清空所有数据</button>
                </div>

                <div class="setting-group">
                    <h3>ℹ️ 关于</h3>
                    <p class="about-text">智能记账 v1.0</p>
                    <p class="about-text">数据本地存储，隐私安全</p>
                </div>
            </div>
        </section>
    </main>

    <!-- ===== 底部 Tab 导航 ===== -->
    <nav class="tab-nav">
        <button class="tab-btn active" data-tab="record">
            <span class="tab-icon">📝</span>
            <span class="tab-label">记账</span>
        </button>
        <button class="tab-btn" data-tab="list">
            <span class="tab-icon">📋</span>
            <span class="tab-label">流水</span>
        </button>
        <button class="tab-btn" data-tab="analytics">
            <span class="tab-icon">📊</span>
            <span class="tab-label">分析</span>
        </button>
        <button class="tab-btn" data-tab="settings">
            <span class="tab-icon">⚙️</span>
            <span class="tab-label">设置</span>
        </button>
    </nav>

    <!-- ===== 依赖（添加版本号强制刷新缓存） ===== -->
    <script src="js/db2.js"></script>
    <script src="js/sync2.js"></script>
    <script src="js/app2.js"></script>
</body>
</html>
