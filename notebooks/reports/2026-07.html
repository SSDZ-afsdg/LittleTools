<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026年7月 消费报告</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background: #f5f7fa; color: #333; }
        .header { background: linear-gradient(135deg, #4CAF50, #388E3C); color: white; padding: 30px; border-radius: 12px; text-align: center; margin-bottom: 24px; }
        .header h1 { margin: 0; font-size: 24px; }
        .header p { margin: 8px 0 0; opacity: 0.9; }
        .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); text-align: center; }
        .card .number { font-size: 28px; font-weight: 700; color: #388E3C; }
        .card .label { font-size: 13px; color: #888; margin-top: 4px; }
        .section { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .section h2 { margin-top: 0; font-size: 18px; border-bottom: 2px solid #4CAF50; padding-bottom: 8px; }
        .chart { text-align: center; margin: 16px 0; }
        .chart img { max-width: 100%; border-radius: 8px; }
        .summary-text { line-height: 1.8; font-size: 15px; color: #444; }
        .comparison { display: flex; gap: 24px; flex-wrap: wrap; }
        .comparison-item { flex: 1; min-width: 150px; background: #f8f9fa; padding: 16px; border-radius: 8px; text-align: center; }
        .comparison-item .diff { font-size: 20px; font-weight: 700; }
        .comparison-item .diff.up { color: #f44336; }
        .comparison-item .diff.down { color: #4CAF50; }
        .footer { text-align: center; color: #aaa; font-size: 12px; margin-top: 24px; }
        .top-item { background: #FFF8E1; padding: 12px 16px; border-radius: 8px; border-left: 4px solid #FF9800; }
        .advice { background: #E8F5E9; padding: 16px; border-radius: 8px; border-left: 4px solid #4CAF50; }
</style>
</head>
<body>
    <div class="header">
        <h1>🧾 2026年7月 消费报告</h1>
        <p>生成时间: 2026-07-09 11:51</p>
    </div>

    <div class="cards">
        <div class="card">
            <div class="number">¥186</div>
            <div class="label">总支出</div>
        </div>
        <div class="card">
            <div class="number">1</div>
            <div class="label">消费笔数</div>
        </div>
        <div class="card">
            <div class="number">¥186</div>
            <div class="label">日均支出</div>
        </div>
    </div>

    <div class="section">
        <h2>📊 类别分布</h2>
        <div class="chart">
            <img src="category_pie.png" alt="类别分布饼图">
        </div>
    </div>

    <div class="section">
        <h2>📈 每日趋势</h2>
        <div class="chart">
            <img src="daily_trend.png" alt="每日消费趋势">
        </div>
    </div>

    <div class="section">
        <h2>📊 与上月对比</h2>
        <div class="comparison">
            <div class="comparison-item">
                <div>本月</div>
                <div style="font-size:24px;font-weight:700;">¥186</div>
            </div>
            <div class="comparison-item">
                <div>较上月</div>
                <div class="diff up">
                    +186 (+0.0%)
                </div>
            </div>
        </div>
    </div>

    <div class="section">
        <h2>🏆 本月最大单笔消费</h2>
        <div class='top-item'>¥186.00 · 餐饮 · 吃火锅</div>
    </div>

    <div class="section">
        <h2>🤖 AI 月度总结</h2>
        <div class="summary-text">{'amount': 186.0, 'category': '餐饮', 'description': '本月在餐饮上的消费完全覆盖了总支出，没有其他花费。需要注意控制饮食的健康和成本，适当增加其他方面的支出如娱乐或教育等。'}</div>
    </div>

    <div class="footer">
        智能记账系统 · 数据本地存储 · 隐私安全
    </div>
</body>
</html>
